# This is a basic workflow to build robot code.

name: CI

# Controls when the action will run
on: [push, pull_request]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  format:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - uses: actions/checkout@v2

    - name: Install setuptools
      run: sudo apt-get install python3-setuptools -y

    - name: Install yapf
      run: sudo pip3 install yapf

    - name: Run yapf
      run: |
        python3 -m yapf --style google -i export.py rasterize.py

    # Ensure formatter made no changes
    - name: Check output
      run: git --no-pager diff --exit-code HEAD
  export:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    - name: Install add-apt-repository
      run: |
        sudo apt-get update -q
        sudo apt-get install gnupg lsb-release software-properties-common -y

    - name: Install inkscape and imagemagick
      run: |
        sudo add-apt-repository ppa:inkscape.dev/stable
        sudo apt-get update -q
        sudo apt-get install inkscape imagemagick -y

    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - uses: actions/checkout@v2

    - name: Install setuptools
      run: sudo apt-get install python3-setuptools -y

    - name: Run inkscape export
      run: |
        inkscape --version
        ./export.py

    # Ensure formatter made no changes
    - name: Check output
      run: git --no-pager diff --exit-code HEAD
